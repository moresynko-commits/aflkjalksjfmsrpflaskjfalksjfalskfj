services:
  - type: web
    name: msrp-systems
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
    env: manual
    handles:
      - content: |
          http {
            pool: none
          }
        language: envoyproxy
        listen: 0.0.0.0:10000
    autoDeploy: true

